<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Atos - Permanência</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: #eef3f7;
      color: #1f2933;
      padding: 28px 16px;
    }
    .container {
      max-width: 980px;
      margin: auto;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,.12);
      overflow: hidden;
    }
    header {
      background: #0b3b5f;
      color: #fff;
      padding: 26px 30px;
    }
    header h1 { margin: 0 0 8px; font-size: 24px; }
    header p { margin: 0; opacity: .92; }
    .tabs { display: flex; background: #f3f7fa; border-bottom: 1px solid #d9e2ec; }
    .tab-btn {
      flex: 1;
      border: 0;
      padding: 16px;
      font-weight: 700;
      cursor: pointer;
      background: transparent;
      color: #173f5f;
      font-size: 15px;
    }
    .tab-btn.active { background: #fff; border-bottom: 4px solid #0b3b5f; }
    main { padding: 28px 30px 32px; }
    .tab { display: none; }
    .tab.active { display: block; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
    .full { grid-column: 1 / -1; }
    label {
      display: block;
      margin-bottom: 7px;
      color: #173f5f;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: .02em;
      text-transform: uppercase;
    }
    input, select {
      width: 100%;
      padding: 12px 13px;
      border: 2px solid #dce4ea;
      border-radius: 10px;
      font-size: 15px;
      background: #fff;
    }
    input:focus, select:focus { outline: none; border-color: #0b3b5f; }
    .sexo-opcoes { display: flex; gap: 16px; flex-wrap: wrap; }
    .sexo-opcoes label {
      width: auto;
      text-transform: none;
      font-size: 15px;
      font-weight: 600;
      color: #1f2933;
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      padding: 12px 14px;
      border: 2px solid #dce4ea;
      border-radius: 10px;
      cursor: pointer;
    }
    .sexo-opcoes input { width: auto; }
    .actions { margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap; }
    button.action {
      border: 0;
      border-radius: 10px;
      padding: 14px 18px;
      background: #0b3b5f;
      color: #fff;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
    }
    button.secondary { background: #6b7c8f; }
    .msg {
      display: none;
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      font-weight: 600;
    }
    .msg.ok { display: block; background: #d4edda; color: #155724; }
    .msg.erro { display: block; background: #f8d7da; color: #721c24; }
    footer { background: #f4f7f9; color: #60788c; text-align: center; padding: 15px; font-size: 13px; }
    @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } header, main { padding-left: 20px; padding-right: 20px; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Gerador de Atos Administrativos</h1>
      <p>Abono de Permanência e Adicional de Permanência</p>
    </header>

    <div class="tabs">
      <button class="tab-btn active" data-tab="abono">Abono de Permanência</button>
      <button class="tab-btn" data-tab="adicional">Adicional de Permanência</button>
    </div>

    <main>
      <section id="abono" class="tab active">
        <form id="formAbono">
          <div class="grid">
            <div class="full">
              <label>Sexo do servidor</label>
              <div class="sexo-opcoes">
                <label><input type="radio" name="sexoAbono" value="masculino" checked> Masculino</label>
                <label><input type="radio" name="sexoAbono" value="feminino"> Feminino</label>
              </div>
            </div>

            <div><label>Nº do ato</label><input id="abono_n_ato" required></div>
            <div><label>Ano</label><input id="abono_ano" required></div>
            <div><label>Número do processo</label><input id="abono_numero_processo" required></div>
            <div><label>Data da solicitação</label><input id="abono_data_solicitacao" placeholder="dd/mm/aaaa" required></div>
            <div><label>Nome do servidor</label><input id="abono_nome_servidor" required></div>
            <div><label>Cargo</label><input id="abono_cargo" required></div>
            <div><label>Matrícula</label><input id="abono_matricula" required></div>
            <div><label>Data do direito</label><input id="abono_data_direito" placeholder="dd/mm/aaaa" required></div>
            <div><label>Ofício DIVIPREV</label><input id="abono_oficio_diviprev" required></div>
            <div><label>Responsável</label><input id="abono_responsavel" required></div>

            <div class="full">
              <label>Previsão legal</label>
              <select id="abono_previsao" required>
                <option value="">Selecione...</option>
                <option value="art. 2º, § 5º, da Emenda Constitucional nº 41/2003, c/c artigo 69, da Lei Complementar nº 126/2006">art. 2º, § 5º, da Emenda Constitucional nº 41/2003, c/c artigo 69, da Lei Complementar nº 126/2006</option>
                <option value="art. 3º, § 1º, da Emenda Constitucional nº 41/2003, c/c artigo 69, § 1º, da Lei Complementar nº 126/2006">art. 3º, § 1º, da Emenda Constitucional nº 41/2003, c/c artigo 69, § 1º, da Lei Complementar nº 126/2006</option>
                <option value="artigo 40, § 19, da Constituição Federal 1988, c/c artigo 69, da Lei Complementar nº 126/2006">artigo 40, § 19, da Constituição Federal 1988, c/c artigo 69, da Lei Complementar nº 126/2006</option>
              </select>
            </div>

            <div class="full">
              <label>Condição</label>
              <select id="abono_condicao" required disabled>
                <option value="">Selecione uma previsão legal primeiro</option>
              </select>
            </div>
          </div>

          <div class="actions">
            <button type="submit" class="action">Gerar PDF</button>
            <button type="reset" class="action secondary">Limpar</button>
          </div>
          <div id="msgAbono" class="msg"></div>
        </form>
      </section>

      <section id="adicional" class="tab">
        <form id="formAdicional">
          <div class="grid">
            <div class="full">
              <label>Sexo do servidor</label>
              <div class="sexo-opcoes">
                <label><input type="radio" name="sexoAdicional" value="masculino" checked> Masculino</label>
                <label><input type="radio" name="sexoAdicional" value="feminino"> Feminino</label>
              </div>
            </div>

            <div><label>Nº do ato</label><input id="adicional_n_ato" required></div>
            <div><label>Ano</label><input id="adicional_ano" required></div>
            <div><label>Número do processo</label><input id="adicional_numero_processo" required></div>
            <div><label>Data da solicitação</label><input id="adicional_data_solicitacao" placeholder="dd/mm/aaaa" required></div>
            <div><label>Nome do servidor</label><input id="adicional_nome_servidor" required></div>
            <div><label>Cargo</label><input id="adicional_cargo" required></div>
            <div><label>Matrícula</label><input id="adicional_matricula" required></div>
            <div><label>Data do direito</label><input id="adicional_data_direito" placeholder="dd/mm/aaaa" required></div>
            <div><label>Responsável</label><input id="adicional_responsavel" required></div>
          </div>

          <div class="actions">
            <button type="submit" class="action">Gerar PDF</button>
            <button type="reset" class="action secondary">Limpar</button>
          </div>
          <div id="msgAdicional" class="msg"></div>
        </form>
      </section>
    </main>

    <footer>Gerência de Pessoal e Aposentadoria</footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script>
    const { jsPDF } = window.jspdf;

    const condicoes = {
      "1": [
        ["art. 2º, § 1º, da Emenda Constitucional nº 41/2003, c/c artigo 64, § 1º, da Lei Complementar nº 126/2006", "art. 2º, § 1º, da Emenda Constitucional nº 41/2003, c/c artigo 64, § 1º, da Lei Complementar nº 126/2006"],
        ["art. 2º, caput, da Emenda Constitucional nº 41/2003, c/c artigo 64 da Lei Complementar nº 126/2006", "art. 2º, caput, da Emenda Constitucional nº 41/2003, c/c artigo 64 da Lei Complementar nº 126/2006"]
      ],
      "2": [
        ["art. 3º, § 1º, da Emenda Constitucional nº 41/2003, c/c artigo 69, § 1º, da Lei Complementar nº 126/2006", "art. 3º, § 1º, da Emenda Constitucional nº 41/2003, c/c artigo 69, § 1º, da Lei Complementar nº 126/2006"]
      ],
      "3": [
        ["artigo 40, § 1º, inciso III, alínea “a”, da Constituição Federal 1988, c/c artigo 15, da Lei Complementar nº 126/2006", "artigo 40, § 1º, inciso III, alínea “a”, da Constituição Federal 1988, c/c artigo 15, da Lei Complementar nº 126/2006"],
        ["artigo 40, § 1º, inciso III, alínea “a”, da Constituição Federal 1988, c/c artigo 40, § 5º, da Constituição Federal 1988, c/c artigo 15, § 1º, da Lei Complementar nº 126/2006", "artigo 40, § 1º, inciso III, alínea “a”, da Constituição Federal 1988, c/c artigo 40, § 5º, da Constituição Federal 1988, c/c artigo 15, § 1º, da Lei Complementar nº 126/2006"],
        ["artigo 40, § 5º, da Constituição Federal 1988, c/c artigo 15, §1º, da Lei Complementar nº 126/2006", "artigo 40, § 5º, da Constituição Federal 1988, c/c artigo 15, §1º, da Lei Complementar nº 126/2006"]
      ]
    };

    function getPrevisaoNumero(valor) {
      if (valor.startsWith("art. 2º")) return "1";
      if (valor.startsWith("art. 3º")) return "2";
      if (valor.startsWith("artigo 40")) return "3";
      return "";
    }

    document.getElementById("abono_previsao").addEventListener("change", function () {
      const numero = getPrevisaoNumero(this.value);
      const select = document.getElementById("abono_condicao");
      select.innerHTML = "";

      if (!numero) {
        select.disabled = true;
        select.innerHTML = '<option value="">Selecione uma previsão legal primeiro</option>';
        return;
      }

      condicoes[numero].forEach(([value, label]) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = label;
        select.appendChild(option);
      });

      select.disabled = numero === "2";
    });

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.tab).classList.add("active");
      });
    });

    function valor(id) {
      return document.getElementById(id).value.trim();
    }

    function nomeArquivo(texto) {
      return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9_-]/g, "_").replace(/_+/g, "_").substring(0, 60);
    }

    function mensagem(id, texto, tipo) {
      const el = document.getElementById(id);
      el.textContent = texto;
      el.className = `msg ${tipo}`;
    }

    function drawHeader(doc, responsavel) {
      doc.setFont("helvetica", "bold");
      doc.setFontSize(9.5);
      doc.text("SECRETARIA MUNICIPAL DE PLANEJAMENTO, GESTÃO, CIÊNCIA E TECNOLOGIA – SEPLAG", 105, 16, { align: "center" });
      doc.text("DIRETORIA DE RECURSOS HUMANOS", 105, 22, { align: "center" });
      doc.text("GERÊNCIA DE PESSOAL E APOSENTADORIA", 105, 28, { align: "center" });
      doc.setFont("helvetica", "normal");
      doc.setFontSize(8.5);
      doc.text("Avenida Paraná, nº 2.601, sala 310 – bairro São José – Divinópolis, Minas Gerais – CEP: 35.501-170", 105, 35, { align: "center" });
      doc.text("(37) 3229-8152 / 3229-6528 – setorpessoal.divinopolis@gmail.com", 105, 41, { align: "center" });
      doc.text(`Documento elaborado e conferido por ${responsavel}: assinado digitalmente MPV`, 20, 52);
    }

    function addParagraph(doc, text, y, options = {}) {
      doc.setFont("helvetica", options.bold ? "bold" : "normal");
      doc.setFontSize(options.size || 11);
      const lines = doc.splitTextToSize(text, options.width || 170);
      doc.text(lines, options.x || 20, y, { align: options.align || "justify", maxWidth: options.width || 170 });
      return y + (lines.length * (options.lineHeight || 6));
    }

    function gerarPdfAbono(dados) {
      const doc = new jsPDF({ unit: "mm", format: "a4" });
      drawHeader(doc, dados.responsavel);

      let y = 66;
      doc.setFont("helvetica", "bold");
      doc.setFontSize(10);
      doc.text("SECRETARIA MUNICIPAL DE PLANEJAMENTO, GESTÃO, CIÊNCIA E TECNOLOGIA – SEPLAG", 105, y, { align: "center" });
      y += 10;
      doc.setFontSize(12);
      doc.text(`ATO ADMINISTRATIVO Nº ${dados.n_ato} / ${dados.ano}`, 105, y, { align: "center" });
      y += 10;
      doc.setFontSize(10.5);
      doc.text("CONCESSÃO DO ABONO DE PERMANÊNCIA, PREVISTO NA EMENDA CONSTITUCIONAL Nº 41,", 105, y, { align: "center" });
      y += 5;
      doc.text("DE 19 DE DEZEMBRO DE 2003", 105, y, { align: "center" });
      y += 14;

      const artigo = dados.sexo === "feminino" ? "à servidora" : "ao servidor";
      const texto1 = `A Diretora de Recursos Humanos, Sr.ª Mariana Borges Campos dos Santos, no uso das atribuições que lhe são conferidas por lei e em atendimento conforme solicitado no Processo Administrativo nº ${dados.numero_processo}, requerido em ${dados.data_solicitacao}, concede ${artigo} ${dados.nome_servidor}, ocupante do cargo efetivo de ${dados.cargo}, matrícula nº ${dados.matricula}, o ABONO DE PERMANÊNCIA, nos termos do ${dados.previsao}, em razão do cumprimento dos requisitos legais para aposentadoria voluntária, prevista no ${dados.condicao}.`;
      y = addParagraph(doc, texto1, y);
      y += 5;
      const texto2 = `O benefício produzirá efeitos retroativos a partir de ${dados.data_direito}, conforme informado no Ofício ${dados.oficio_diviprev}.`;
      y = addParagraph(doc, texto2, y);
      y += 10;
      doc.text("Registre-se, Publique-se e Cumpra-se.", 20, y);
      y += 14;
      const hoje = new Date().toLocaleDateString("pt-BR", { day: "2-digit", month: "long", year: "numeric" });
      doc.text(`Divinópolis, ${hoje}.`, 20, y);
      y += 28;
      doc.setFont("helvetica", "normal");
      doc.text("(assinado digitalmente)", 105, y, { align: "center" });
      y += 6;
      doc.setFont("helvetica", "bold");
      doc.text("MARIANA BORGES CAMPOS DOS SANTOS", 105, y, { align: "center" });
      y += 6;
      doc.setFont("helvetica", "normal");
      doc.text("Diretora de Recursos Humanos", 105, y, { align: "center" });

      doc.save(`ABONO_DE_PERMANENCIA_${nomeArquivo(dados.nome_servidor)}.pdf`);
    }

    function gerarPdfAdicional(dados) {
      const doc = new jsPDF({ unit: "mm", format: "a4" });
      drawHeader(doc, dados.responsavel);

      let y = 66;
      doc.setFont("helvetica", "bold");
      doc.setFontSize(10);
      doc.text("SECRETARIA MUNICIPAL DE PLANEJAMENTO, GESTÃO, CIÊNCIA E TECNOLOGIA – SEPLAG", 105, y, { align: "center" });
      y += 10;
      doc.setFontSize(12);
      doc.text(`ATO ADMINISTRATIVO Nº ${dados.n_ato} / ${dados.ano}`, 105, y, { align: "center" });
      y += 10;
      doc.setFontSize(11);
      doc.text("CONCESSÃO DO ADICIONAL DE PERMANÊNCIA", 105, y, { align: "center" });
      y += 14;

      const artigo = dados.sexo === "feminino" ? "à servidora" : "ao servidor";
      const texto1 = `A Diretora de Recursos Humanos, Sr.ª Mariana Borges Campos dos Santos, no uso das atribuições que lhe são conferidas pela Lei Complementar nº 009, de 03 de dezembro de 1992, considerando o OFÍCIO PROGER nº 157/2023 e em atendimento ao requerido no Processo Administrativo nº ${dados.numero_processo}, solicitado em ${dados.data_solicitacao}, concede o Adicional de Permanência ${artigo} ${dados.nome_servidor}, ocupante do cargo efetivo de ${dados.cargo}, matrícula nº ${dados.matricula}, nos termos do artigo 103 da referida norma, com efeitos retroativos a partir de ${dados.data_direito}.`;
      y = addParagraph(doc, texto1, y);
      y += 10;
      doc.text("Registre-se, Publique-se e Cumpra-se.", 20, y);
      y += 14;
      const hoje = new Date().toLocaleDateString("pt-BR", { day: "2-digit", month: "long", year: "numeric" });
      doc.text(`Divinópolis, ${hoje}.`, 20, y);
      y += 28;
      doc.text("(assinado digitalmente)", 105, y, { align: "center" });
      y += 6;
      doc.setFont("helvetica", "bold");
      doc.text("MARIANA BORGES CAMPOS DOS SANTOS", 105, y, { align: "center" });
      y += 6;
      doc.setFont("helvetica", "normal");
      doc.text("Diretora de Recursos Humanos", 105, y, { align: "center" });

      doc.save(`ADICIONAL_DE_PERMANENCIA_${nomeArquivo(dados.nome_servidor)}.pdf`);
    }

    document.getElementById("formAbono").addEventListener("submit", function(e) {
      e.preventDefault();
      try {
        const dados = {
          sexo: document.querySelector('input[name="sexoAbono"]:checked').value,
          n_ato: valor("abono_n_ato"),
          ano: valor("abono_ano"),
          numero_processo: valor("abono_numero_processo"),
          data_solicitacao: valor("abono_data_solicitacao"),
          nome_servidor: valor("abono_nome_servidor"),
          cargo: valor("abono_cargo"),
          matricula: valor("abono_matricula"),
          data_direito: valor("abono_data_direito"),
          oficio_diviprev: valor("abono_oficio_diviprev"),
          responsavel: valor("abono_responsavel"),
          previsao: valor("abono_previsao"),
          condicao: valor("abono_condicao")
        };
        gerarPdfAbono(dados);
        mensagem("msgAbono", "PDF gerado com sucesso.", "ok");
      } catch (err) {
        mensagem("msgAbono", "Erro ao gerar PDF: " + err.message, "erro");
      }
    });

    document.getElementById("formAdicional").addEventListener("submit", function(e) {
      e.preventDefault();
      try {
        const dados = {
          sexo: document.querySelector('input[name="sexoAdicional"]:checked').value,
          n_ato: valor("adicional_n_ato"),
          ano: valor("adicional_ano"),
          numero_processo: valor("adicional_numero_processo"),
          data_solicitacao: valor("adicional_data_solicitacao"),
          nome_servidor: valor("adicional_nome_servidor"),
          cargo: valor("adicional_cargo"),
          matricula: valor("adicional_matricula"),
          data_direito: valor("adicional_data_direito"),
          responsavel: valor("adicional_responsavel")
        };
        gerarPdfAdicional(dados);
        mensagem("msgAdicional", "PDF gerado com sucesso.", "ok");
      } catch (err) {
        mensagem("msgAdicional", "Erro ao gerar PDF: " + err.message, "erro");
      }
    });

    document.getElementById("formAbono").addEventListener("reset", () => {
      setTimeout(() => {
        const c = document.getElementById("abono_condicao");
        c.disabled = true;
        c.innerHTML = '<option value="">Selecione uma previsão legal primeiro</option>';
        document.getElementById("msgAbono").className = "msg";
      }, 0);
    });

    document.getElementById("formAdicional").addEventListener("reset", () => {
      setTimeout(() => document.getElementById("msgAdicional").className = "msg", 0);
    });
  </script>
</body>
</html>
